<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animation-engine</title>
		<style>
			body {
				margin: 0;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(min(100%, max(500px, 50%)), 1fr));
				grid-template-rows: auto 1fr;
				width: 100%;
				height: 100svh;
				align-items: center;
			}

			#toolbar {
				grid-column: 1 / -1;
				padding: 0.5rem;
				background: #2a2b2b;
				box-sizing: border-box;
				height: 100%;
				display: flex;
				align-items: center;
				gap: 1rem;
			}

			#toolbar button {
				padding: 0.5rem 1.5rem;
				border: 1px solid currentColor;
				background: transparent;
				color: white;
				border-radius: 0.25rem;
				cursor: pointer;
			}

			#progress {
				color: white;
				font-variant: tabular-nums;
				font-variant-numeric: tabular-nums;
			}

			#editor {
				margin: 0;
				height: 100%;
				box-sizing: border-box;
				width: 100%;
				overflow-y: auto;
				border-right: 1px solid #2a2b2b;
			}

			canvas-player {
				height: auto;
				background: #2a2b2b;
			}
		</style>
  </head>
  <body>
		<div id="toolbar">
			<button id="export">Export</button>
			<div id="progress"></div>
		</div>
		<div id="editor"></div>
		<canvas-player></canvas-player>
    <script type="module" src="main.ts"></script>
  </body>
</html>
